name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- verify: blocks deploy on real correctness signals ---
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Guard against local Git remotes
        run: npm run guard:remotes

      - name: Guard against trailing-slash internal links
        run: npm run guard:links

      - name: Guard structural invariants (image budgets, no framework/icon deps, <pre> aria)
        run: npm run guard:structure

      - name: Guard against unused deps / exports / files (knip)
        run: npm run guard:deps

      - name: Install poppler-utils (pdfinfo + pdftotext for CV PDF tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Type-check (astro check)
        run: npx astro check

      - name: Build
        env:
          DOTBLOG_PUBLISH_POSTS: '1'
        run: npm run build

      - name: Guard against broken internal links (built site)
        run: npm run guard:builtlinks

      - name: Guard JS bundle-size budget (no runtime creep)
        run: npm run guard:bundle

      - name: Install Playwright (chromium only — fast deploy gate)
        run: npx playwright install --with-deps chromium

      - name: Smoke tests (chromium) — blocks deploy on failure
        run: npx playwright test --project=chromium

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # --- deploy: gated by verify; never runs on pull_request (verify-only there) ---
  deploy:
    needs: verify
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # --- healthcheck: confirms the live site actually serves after deploy ---
  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify live site responds 200 with expected content
        run: |
          set -euo pipefail
          url="https://blog.dotmavriq.life/"
          # Pages CDN can lag a few seconds after deploy; retry briefly.
          for attempt in 1 2 3 4 5; do
            if body=$(curl -fsSL --max-time 20 "$url"); then
              if printf '%s' "$body" | grep -q "blog.dotmavriq.life // welcome"; then
                echo "Live site OK (attempt $attempt)."
                exit 0
              fi
              echo "200 but marker missing (attempt $attempt); retrying…"
            else
              echo "Request failed (attempt $attempt); retrying…"
            fi
            sleep 15
          done
          echo "::error::Live site failed health check at $url"
          exit 1

  # --- audit: advisory, runs in parallel with deploy, never blocks ---
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build (for Lighthouse + cross-browser)
        env:
          DOTBLOG_PUBLISH_POSTS: '1'
        run: npm run build

      - name: Lighthouse CI (advisory budgets)
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

      - name: Archive link check (advisory)
        continue-on-error: true
        run: npm run archive:check

      - name: Install Playwright (firefox + webkit)
        run: npx playwright install --with-deps firefox webkit

      - name: Cross-browser smoke (firefox + webkit)
        continue-on-error: true
        run: npx playwright test --project=firefox --project=webkit
