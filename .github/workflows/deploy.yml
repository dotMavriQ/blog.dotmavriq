name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # --- verify: blocks deploy on real correctness signals ---
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Guard against local Git remotes
        run: npm run guard:remotes

      - name: Install poppler-utils (pdfinfo + pdftotext for CV PDF tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Type-check (astro check)
        run: npx astro check

      - name: Build
        env:
          DOTBLOG_PUBLISH_POSTS: '1'
        run: npm run build

      # Playwright smoke tests temporarily disabled while we refactor;
      # type-check + build above remain as deploy gates.

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # --- deploy: gated by verify ---
  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # --- audit: advisory, runs in parallel with deploy, never blocks ---
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build (for Lighthouse + cross-browser)
        env:
          DOTBLOG_PUBLISH_POSTS: '1'
        run: npm run build

      - name: Lighthouse CI (advisory budgets)
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

      - name: Archive link check (advisory)
        continue-on-error: true
        run: npm run archive:check

      - name: Install Playwright (firefox + webkit)
        run: npx playwright install --with-deps firefox webkit

      - name: Cross-browser smoke (firefox + webkit)
        continue-on-error: true
        run: npx playwright test --project=firefox --project=webkit
