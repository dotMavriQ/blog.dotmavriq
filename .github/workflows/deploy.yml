name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # --- verify: blocks deploy on real correctness signals ---
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Guard against local Git remotes
        run: bun run guard:remotes

      - name: Install poppler-utils (pdfinfo + pdftotext for CV PDF tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Type-check (astro check)
        run: bunx astro check

      - name: Build
        run: bun run build

      - name: Install Playwright (chromium only)
        run: bunx playwright install --with-deps chromium

      - name: Playwright tests (chromium only)
        run: bunx playwright test --project=chromium

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # --- deploy: gated by verify ---
  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # --- audit: advisory, runs in parallel with deploy, never blocks ---
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build (for Lighthouse + cross-browser)
        run: bun run build

      - name: Lighthouse CI (advisory budgets)
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json

      - name: Archive link check (advisory)
        run: bun run archive:check

      - name: Install Playwright (firefox + webkit)
        run: bunx playwright install --with-deps firefox webkit

      - name: Cross-browser smoke (firefox + webkit)
        run: bunx playwright test --project=firefox --project=webkit
